name: Release

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        if: steps.tag_check.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | head -1)

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          FEAT=$(echo "$LOG"   | grep -E '^\- feat'   || true)
          FIX=$(echo "$LOG"    | grep -E '^\- fix'    || true)
          UPDATE=$(echo "$LOG" | grep -E '^\- update' || true)
          DOCS=$(echo "$LOG"   | grep -E '^\- docs'   || true)
          CHORE=$(echo "$LOG"  | grep -E '^\- chore'  || true)
          OTHER=$(echo "$LOG"  | grep -vE '^\- (feat|fix|update|docs|chore)' || true)

          BODY=""
          [ -n "$FEAT"   ] && BODY="${BODY}### Features\n${FEAT}\n\n"
          [ -n "$FIX"    ] && BODY="${BODY}### Bug Fixes\n${FIX}\n\n"
          [ -n "$UPDATE" ] && BODY="${BODY}### Updates\n${UPDATE}\n\n"
          [ -n "$DOCS"   ] && BODY="${BODY}### Documentation\n${DOCS}\n\n"
          [ -n "$CHORE"  ] && BODY="${BODY}### Chores\n${CHORE}\n\n"
          [ -n "$OTHER"  ] && BODY="${BODY}### Other\n${OTHER}\n\n"

          {
            echo 'changelog<<EOF'
            printf "%b" "$BODY"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        if: steps.tag_check.outputs.exists == 'false'
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build package
        if: steps.tag_check.outputs.exists == 'false'
        run: poetry build

      - name: Publish to PyPI
        if: steps.tag_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: dist/*
          draft: false
          prerelease: false
